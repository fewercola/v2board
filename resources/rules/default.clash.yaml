mixed-port: 7897
allow-lan: true
mode: rule
log-level: error
ipv6: true
tcp-concurrent: true
external-controller: '0.0.0.0:9090'
geodata-mode: true
geo-auto-update: true
geo-update-interval: 12
geox-url:
    geoip: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat'
    geosite: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat'
    mmdb: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb'
    asn: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb'
profile:
    store-selected: true
    store-fake-ip: true
dns:
    enable: true
    ipv6: true
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    fake-ip-filter: [+.lan, +.local, +.msftconnecttest.com, +.msftncsi.com, localhost.ptlogin2.qq.com, '*.194969.xyz', letcola.eu.org]
    default-nameserver: [223.5.5.5, 119.29.29.29]
    nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query', 223.5.5.5, 119.29.29.29]
    proxy-server-nameserver: [223.5.5.5, 119.29.29.29, 'https://doh.pub/dns-query']
    nameserver-policy: { 'geosite:cn': [223.5.5.5, 119.29.29.29, 'https://doh.pub/dns-query'], 'geosite:geolocation-!cn': ['https://dns.cloudflare.com/dns-query#PROXY', 'https://dns.google/dns-query#PROXY'], +.gstatic.com: [223.5.5.5, 119.29.29.29] }

proxies:
proxy-groups:
  - { name: "PROXY", type: select, proxies: ["AUTO", "DIRECT"] }
  - { name: "AUTO", type: url-test, proxies: [], url: "http://www.gstatic.com/generate_204", interval: 300, tolerance: 50 }

rules:
    - 'DOMAIN,letcola.eu.org,DIRECT'
    - 'GEOIP,lan,DIRECT,no-resolve'
    - 'GEOIP,private,DIRECT,no-resolve'
    - 'DOMAIN-KEYWORD,ocsp,DIRECT'

    # 学术站点：后缀匹配 -> 关键词匹配
    - 'DOMAIN-KEYWORD,ieee,DIRECT'
    - 'DOMAIN-KEYWORD,acm,DIRECT'
    - 'DOMAIN-KEYWORD,springer,DIRECT'
    - 'DOMAIN-KEYWORD,springerlink,DIRECT'
    - 'DOMAIN-KEYWORD,sciencedirect,DIRECT'
    - 'DOMAIN-KEYWORD,elsevier,DIRECT'
    - 'DOMAIN-KEYWORD,nature,DIRECT'
    - 'DOMAIN-KEYWORD,science,DIRECT'
    - 'DOMAIN-KEYWORD,wiley,DIRECT'
    - 'DOMAIN-KEYWORD,tandfonline,DIRECT'
    - 'DOMAIN-KEYWORD,mdpi,DIRECT'
    - 'DOMAIN-KEYWORD,frontiersin,DIRECT'
    - 'DOMAIN-KEYWORD,plos,DIRECT'
    - 'DOMAIN-KEYWORD,jstor,DIRECT'
    
    # 论文检索/预印本/评审
    - 'DOMAIN-KEYWORD,arxiv,DIRECT'
    - 'DOMAIN-KEYWORD,biorxiv,DIRECT'
    - 'DOMAIN-KEYWORD,medrxiv,DIRECT'
    - 'DOMAIN-KEYWORD,openreview,DIRECT'
    - 'DOMAIN-KEYWORD,semanticscholar,DIRECT'
    - 'DOMAIN-KEYWORD,dblp,DIRECT'

    # DOI/出版社/期刊平台
    - 'DOMAIN-KEYWORD,doi,DIRECT'          # doi.org / dx.doi.org 等
    - 'DOMAIN-KEYWORD,oup,DIRECT'          # Oxford
    - 'DOMAIN-KEYWORD,cambridge,DIRECT'    # Cambridge
    - 'DOMAIN-KEYWORD,sagepub,DIRECT'      # SAGE
    - 'DOMAIN-KEYWORD,iop,DIRECT'          # IOP
    - 'DOMAIN-KEYWORD,aip,DIRECT'          # AIP
    - 'DOMAIN-KEYWORD,aps,DIRECT'          # APS
    - 'DOMAIN-KEYWORD,cell,DIRECT'         # Cell (cell.com)

    # 常见会议/学会官网
    - 'DOMAIN-KEYWORD,usenix,DIRECT'
    - 'DOMAIN-KEYWORD,aaai,DIRECT'
    - 'DOMAIN-KEYWORD,ijcai,DIRECT'
    - 'DOMAIN-KEYWORD,neurips,DIRECT'
    - 'DOMAIN-KEYWORD,icml,DIRECT'
    - 'DOMAIN-KEYWORD,thecvf,DIRECT'       # CVF (CVPR/ICCV/ECCV)
    - 'DOMAIN-KEYWORD,aclanthology,DIRECT' # ACL Anthology

    - 'GEOSITE,category-ads-all,REJECT'
    - 'GEOIP,CN,DIRECT'
    - 'MATCH,PROXY'